<IfModule mod_ssl.c>
<VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName www.aranduinformatica.net
        
        # PÁGINA PRINCIPAL - ARANDU&JAR
        DocumentRoot /var/www/arandujar/frontend/build
        
        <Directory /var/www/arandujar/frontend/build>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
            
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !^/prive
            RewriteCond %{REQUEST_URI} !^/arandu-clinic
            RewriteCond %{REQUEST_URI} !^/puntero
            RewriteCond %{REQUEST_URI} !^/pds
            RewriteRule . /index.html [L]
        </Directory>

        # === PUNTERO ===
        Alias /puntero /var/www/html/puntero/

        <Directory /var/www/html/puntero/>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        # === PRIVE APP ===
        Alias /prive /var/www/prive/frontend/build

        <Directory /var/www/prive/frontend/build>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted

            RewriteEngine On
            RewriteBase /prive/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /prive/index.html [L]
        </Directory>

        # Backend API para Prive (puerto 8001)
        ProxyPass /prive/api http://127.0.0.1:8001/api
        ProxyPassReverse /prive/api http://127.0.0.1:8001/api

        # === ARANDU CLINIC ===
        # Backend API para Arandu Clinic (puerto 8003)
        ProxyPass /arandu-clinic/api http://127.0.0.1:8003/api
        ProxyPassReverse /arandu-clinic/api http://127.0.0.1:8003/api

        Alias /arandu-clinic /var/www/arandu-clinic/frontend/build

        <Directory /var/www/arandu-clinic/frontend/build>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted

            RewriteEngine On
            RewriteBase /arandu-clinic
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /arandu-clinic/index.html [L]
        </Directory>

        # ==========================================
        # === PDS - SISTEMA GESTION ODONTOLÓGICO ===
        # ==========================================
        
        # Backend API para PDS (puerto 8004)
        ProxyPass /pds/api http://127.0.0.1:8004/api
        ProxyPassReverse /pds/api http://127.0.0.1:8004/api

        Alias /pds /var/www/pds/frontend/build

        <Directory /var/www/pds/frontend/build>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted

            RewriteEngine On
            RewriteBase /pds/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /pds/index.html [L]
        </Directory>

        # Backend API principal - ARANDU&JAR (puerto 8002)
        ProxyPreserveHost On
        ProxyPass /api http://127.0.0.1:8002/api
        ProxyPassReverse /api http://127.0.0.1:8002/api

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        Include /etc/letsencrypt/options-ssl-apache.conf
        SSLCertificateFile /etc/letsencrypt/live/www.aranduinformatica.net/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/www.aranduinformatica.net/privkey.pem
</VirtualHost>
</IfModule>
